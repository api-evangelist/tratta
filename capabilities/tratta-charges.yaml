naftiko: 1.0.0-alpha2
info:
  label: Tratta API — Charges
  description: 'Tratta API — Charges. 3 operations. Lead operation: List Charges. Self-contained Naftiko capability covering
    one Tratta business surface.'
  tags:
  - Tratta
  - Charges
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRATTA_API_KEY: TRATTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: tratta-charges
    baseUri: https://{org-uuid}.production.tratta.io/api/v1
    description: Tratta API — Charges business capability. Self-contained, no shared references.
    resources:
    - name: charges
      path: /charges
      operations:
      - name: listcharges
        method: GET
        description: List Charges
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcharge
        method: POST
        description: Create Charge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: charges-id
      path: /charges/{id}
      operations:
      - name: getcharge
        method: GET
        description: Get Charge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TRATTA_API_KEY}}'
  exposes:
  - type: rest
    namespace: tratta-charges-rest
    port: 8080
    description: REST adapter for Tratta API — Charges. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/charges
      name: charges
      description: REST surface for charges.
      operations:
      - method: GET
        name: listcharges
        description: List Charges
        call: tratta-charges.listcharges
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcharge
        description: Create Charge
        call: tratta-charges.createcharge
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/charges/{id}
      name: charges-id
      description: REST surface for charges-id.
      operations:
      - method: GET
        name: getcharge
        description: Get Charge
        call: tratta-charges.getcharge
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tratta-charges-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tratta API — Charges. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-charges
      description: List Charges
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tratta-charges.listcharges
      outputParameters:
      - type: object
        mapping: $.
    - name: create-charge
      description: Create Charge
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tratta-charges.createcharge
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-charge
      description: Get Charge
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tratta-charges.getcharge
      outputParameters:
      - type: object
        mapping: $.
