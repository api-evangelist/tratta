naftiko: 1.0.0-alpha2
info:
  label: Tratta API — Tickets
  description: 'Tratta API — Tickets. 2 operations. Lead operation: List Tickets. Self-contained Naftiko capability covering
    one Tratta business surface.'
  tags:
  - Tratta
  - Tickets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRATTA_API_KEY: TRATTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: tratta-tickets
    baseUri: https://{org-uuid}.production.tratta.io/api/v1
    description: Tratta API — Tickets business capability. Self-contained, no shared references.
    resources:
    - name: tickets
      path: /tickets
      operations:
      - name: listtickets
        method: GET
        description: List Tickets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createticket
        method: POST
        description: Create Ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TRATTA_API_KEY}}'
  exposes:
  - type: rest
    namespace: tratta-tickets-rest
    port: 8080
    description: REST adapter for Tratta API — Tickets. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/tickets
      name: tickets
      description: REST surface for tickets.
      operations:
      - method: GET
        name: listtickets
        description: List Tickets
        call: tratta-tickets.listtickets
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createticket
        description: Create Ticket
        call: tratta-tickets.createticket
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tratta-tickets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tratta API — Tickets. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-tickets
      description: List Tickets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tratta-tickets.listtickets
      outputParameters:
      - type: object
        mapping: $.
    - name: create-ticket
      description: Create Ticket
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tratta-tickets.createticket
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
