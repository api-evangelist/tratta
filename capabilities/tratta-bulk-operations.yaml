naftiko: 1.0.0-alpha2
info:
  label: Tratta API — Bulk Operations
  description: 'Tratta API — Bulk Operations. 1 operations. Lead operation: Bulk Import Debt Accounts. Self-contained Naftiko
    capability covering one Tratta business surface.'
  tags:
  - Tratta
  - Bulk Operations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRATTA_API_KEY: TRATTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: tratta-bulk-operations
    baseUri: https://{org-uuid}.production.tratta.io/api/v1
    description: Tratta API — Bulk Operations business capability. Self-contained, no shared references.
    resources:
    - name: bulk-debt_accounts
      path: /bulk/debt_accounts
      operations:
      - name: bulkimportdebtaccounts
        method: POST
        description: Bulk Import Debt Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TRATTA_API_KEY}}'
  exposes:
  - type: rest
    namespace: tratta-bulk-operations-rest
    port: 8080
    description: REST adapter for Tratta API — Bulk Operations. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/bulk/debt-accounts
      name: bulk-debt-accounts
      description: REST surface for bulk-debt_accounts.
      operations:
      - method: POST
        name: bulkimportdebtaccounts
        description: Bulk Import Debt Accounts
        call: tratta-bulk-operations.bulkimportdebtaccounts
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tratta-bulk-operations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tratta API — Bulk Operations. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: bulk-import-debt-accounts
      description: Bulk Import Debt Accounts
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tratta-bulk-operations.bulkimportdebtaccounts
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
